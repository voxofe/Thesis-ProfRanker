name: Sync split repos

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate required secret
        run: |
          if [ -z "${{ secrets.SPLIT_SYNC_TOKEN }}" ]; then
            echo "Missing SPLIT_SYNC_TOKEN secret in Thesis-ProfRanker"
            exit 1
          fi

      - name: Add target remotes
        run: |
          git remote add react "https://x-access-token:${{ secrets.SPLIT_SYNC_TOKEN }}@github.com/voxofe/Thesis-ProfRanker-React.git"
          git remote add django "https://x-access-token:${{ secrets.SPLIT_SYNC_TOKEN }}@github.com/voxofe/Thesis-ProfRanker-Django.git"

      - name: Split and push client to React repo
        run: |
          git subtree split --prefix client -b split-client
          git push --force react split-client:main

      - name: Split and push server to Django repo
        run: |
          git subtree split --prefix server -b split-server
          git push --force django split-server:main
